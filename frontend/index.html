<!DOCTYPE html>
<html class="dark" lang="es">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>MotorsCars - Mercado Premium de Autos</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
    rel="stylesheet" />
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: { "primary": "#1152d4", "background-light": "#f6f6f8", "background-dark": "#101622" },
          fontFamily: { "display": ["Inter"] },
          borderRadius: { "DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px" },
        },
      },
    }
  </script>
  <link rel="stylesheet" href="/static/style.css" />
</head>

<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen">

  <!--Header-->
  <header
    class="sticky top-0 z-50 bg-background-light/80 dark:bg-background-dark/80 backdrop-blur-md border-b border-slate-200 dark:border-slate-800">
    <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between gap-4">
      <a href="index.html" class="flex items-center gap-2">
        <span class="material-symbols-outlined text-primary text-3xl">directions_car</span>
        <h1 class="text-xl font-bold tracking-tight">MotorsCars</h1>
      </a>
      <nav class="hidden md:flex items-center gap-6 text-sm font-medium">
        <a href="index.html" class="text-primary">Autos</a>
        <a href="brands.html" class="hover:text-primary transition-colors">Marcas</a>
      </nav>
      <div class="flex items-center gap-3">
        <a href="car-form.html"
          class="flex items-center gap-2 bg-primary hover:bg-primary/90 text-white px-4 py-2 rounded-xl font-semibold text-sm transition-colors">
          <span class="material-symbols-outlined text-sm">add_circle</span>
          Vender Auto
        </a>
      </div>
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-4 py-6">
    <!-- Banner Carrusel -->
    <section class="mb-8 relative rounded-2xl overflow-hidden shadow-lg">
      <div id="heroBanner" class="relative w-full aspect-[4/1] bg-slate-900">
        <!-- Las imágenes se cargan dinámicamente -->
      </div>
      <button onclick="slideBanner(-1)"
        class="absolute left-3 top-1/2 -translate-y-1/2 bg-black/40 hover:bg-black/60 text-white w-10 h-10 rounded-full flex items-center justify-center transition-colors z-10">
        <span class="material-symbols-outlined">chevron_left</span>
      </button>
      <button onclick="slideBanner(1)"
        class="absolute right-3 top-1/2 -translate-y-1/2 bg-black/40 hover:bg-black/60 text-white w-10 h-10 rounded-full flex items-center justify-center transition-colors z-10">
        <span class="material-symbols-outlined">chevron_right</span>
      </button>
      <div id="bannerDots" class="absolute bottom-3 left-1/2 -translate-x-1/2 flex gap-2 z-10">
      </div>
    </section>

    <!-- Filtro por Marca -->
    <section class="mb-8">
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-lg font-bold">Buscar por Marca</h2>
        <button id="clearFilter" class="text-primary text-sm font-medium hover:underline hidden">Limpiar Filtro</button>
      </div>
      <div id="brandList" class="flex gap-4 overflow-x-auto pb-4 no-scrollbar">
      </div>
    </section>

    <!-- Listado de Autos -->
    <section>
      <div class="flex items-center justify-between mb-6">
        <h2 class="text-xl font-bold" id="sectionTitle">Todos los Autos Disponibles alex</h2>
      </div>
      <div id="carGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
      </div>
      <div id="emptyState" class="hidden text-center py-20">
        <span class="material-symbols-outlined text-6xl text-slate-300 dark:text-slate-700">directions_car</span>
        <p class="mt-4 text-slate-500">No se encontraron autos.</p>
      </div>
      <div id="loadingState" class="text-center py-20">
        <p class="text-slate-500">Cargando autos...</p>
      </div>
    </section>
  </main>

  <!-- Navegación Móvil Responsive -->
  <nav
    class="md:hidden fixed bottom-0 left-0 right-0 bg-slate-100 dark:bg-background-dark/95 border-t border-slate-200 dark:border-slate-800 backdrop-blur-lg z-50">
    <div class="flex items-center justify-around h-16">
      <a class="flex flex-col items-center gap-1 text-primary" href="index.html">
        <span class="material-symbols-outlined">home</span>
        <span class="text-[10px] font-medium">Inicio</span>
      </a>
      <a class="flex flex-col items-center gap-1 text-slate-400" href="brands.html">
        <span class="material-symbols-outlined">category</span>
        <span class="text-[10px] font-medium">Marcas</span>
      </a>
      <a class="flex flex-col items-center gap-1 -mt-8" href="car-form.html">
        <div
          class="bg-primary text-white p-3 rounded-full shadow-lg shadow-primary/40 border-4 border-background-light dark:border-background-dark">
          <span class="material-symbols-outlined">add</span>
        </div>
        <span class="text-[10px] font-medium mt-1 text-slate-400">Vender</span>
      </a>
      <a class="flex flex-col items-center gap-1 text-slate-400" href="index.html">
        <span class="material-symbols-outlined">search</span>
        <span class="text-[10px] font-medium">Buscar</span>
      </a>
      <a class="flex flex-col items-center gap-1 text-slate-400" href="#">
        <span class="material-symbols-outlined">person</span>
        <span class="text-[10px] font-medium">Perfil</span>
      </a>
    </div>
  </nav>

  <footer
    class="mt-20 border-t border-slate-200 dark:border-slate-800 bg-slate-100 dark:bg-slate-900/50 py-12 pb-24 md:pb-12">
    <div class="max-w-7xl mx-auto px-4 text-center text-xs text-slate-500">
      &copy; 2026 MotorsCars. Todos los derechos reservados.
    </div>
  </footer>

  <script src="/static/app.js"></script>
  <script>
    let activeBrandId = null;

    async function loadBrands() {
      try {
        const brands = await getBrands();
        const container = document.getElementById("brandList");
        container.innerHTML = brands.map(b => `
        <div class="flex-shrink-0 group cursor-pointer" onclick="filterByBrand(${b.id}, '${b.name.replace(/'/g, "\\'")}')">
          <div class="w-20 h-20 rounded-2xl bg-slate-100 dark:bg-slate-800 border border-slate-200 dark:border-slate-800 flex flex-col items-center justify-center gap-2 group-hover:border-primary transition-colors brand-card" data-brand-id="${b.id}">
            <span class="text-xs font-semibold">${b.name}</span>
          </div>
        </div>
      `).join("");
      } catch (e) {
        console.error("Error al cargar marcas:", e);
      }
    }

    function getCarImages(car) {
      if (car.images && car.images.length > 0) {
        return car.images.map(img => img.image_url);
      }
      if (car.image_url) return [car.image_url];
      return [];
    }

    function renderCarousel(carId, images) {
      if (images.length === 0) {
        return `<span class="material-symbols-outlined text-5xl text-slate-400">directions_car</span>`;
      }
      if (images.length === 1) {
        return `<img class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500" src="${images[0]}" alt="Auto" />`;
      }
      return `
      <div class="carousel relative w-full h-full" data-car-id="${carId}">
        ${images.map((src, i) => `
          <img class="absolute inset-0 w-full h-full object-cover transition-opacity duration-300 ${i === 0 ? 'opacity-100' : 'opacity-0 pointer-events-none'}" data-slide="${i}" src="${src}" alt="Foto ${i + 1}" />
        `).join("")}
        <button onclick="event.preventDefault();event.stopPropagation();slideCard(${carId},-1)" class="absolute left-1 top-1/2 -translate-y-1/2 bg-black/50 hover:bg-black/70 text-white w-7 h-7 rounded-full flex items-center justify-center transition-colors z-10">
          <span class="material-symbols-outlined text-sm">chevron_left</span>
        </button>
        <button onclick="event.preventDefault();event.stopPropagation();slideCard(${carId},1)" class="absolute right-1 top-1/2 -translate-y-1/2 bg-black/50 hover:bg-black/70 text-white w-7 h-7 rounded-full flex items-center justify-center transition-colors z-10">
          <span class="material-symbols-outlined text-sm">chevron_right</span>
        </button>
        <div class="absolute bottom-2 left-1/2 -translate-x-1/2 flex gap-1 z-10">
          ${images.map((_, i) => `<div class="w-1.5 h-1.5 rounded-full ${i === 0 ? 'bg-white' : 'bg-white/50'}" data-dot="${i}"></div>`).join("")}
        </div>
      </div>
    `;
    }

    const carouselState = {};

    function slideCard(carId, dir) {
      const carousel = document.querySelector(`.carousel[data-car-id="${carId}"]`);
      if (!carousel) return;
      const slides = carousel.querySelectorAll("[data-slide]");
      const dots = carousel.querySelectorAll("[data-dot]");
      const total = slides.length;
      const current = carouselState[carId] || 0;
      const next = (current + dir + total) % total;
      carouselState[carId] = next;

      slides.forEach((s, i) => {
        s.classList.toggle("opacity-100", i === next);
        s.classList.toggle("opacity-0", i !== next);
        s.classList.toggle("pointer-events-none", i !== next);
      });
      dots.forEach((d, i) => {
        d.classList.toggle("bg-white", i === next);
        d.classList.toggle("bg-white/50", i !== next);
      });
    }

    async function loadCars(brandId = null) {
      const grid = document.getElementById("carGrid");
      const empty = document.getElementById("emptyState");
      const loading = document.getElementById("loadingState");
      loading.classList.remove("hidden");
      grid.innerHTML = "";
      empty.classList.add("hidden");

      try {
        const cars = brandId ? await getCarsByBrand(brandId) : await getCars();
        loading.classList.add("hidden");

        if (cars.length === 0) {
          empty.classList.remove("hidden");
          return;
        }

        grid.innerHTML = cars.map(car => {
          const images = getCarImages(car);
          return `
        <div class="group bg-slate-100 dark:bg-slate-800 rounded-2xl overflow-hidden border border-slate-200 dark:border-slate-800 hover:shadow-xl transition-shadow">
          <a href="car-detail.html?id=${car.id}" class="block">
            <div class="relative h-48 overflow-hidden bg-slate-200 dark:bg-slate-700 flex items-center justify-center">
              ${renderCarousel(car.id, images)}
            </div>
          </a>
          <div class="p-4">
            <a href="car-detail.html?id=${car.id}" class="font-bold text-lg hover:text-primary block mb-1">${car.brand ? car.brand.name : ''} ${car.model}</a>
            <p class="text-slate-500 dark:text-slate-400 text-sm mb-2">${car.fuel_type} &middot; ${car.transmission}</p>
            <span class="text-primary font-bold text-xl block mb-3">${formatPrice(car.price)}</span>
            <div class="grid grid-cols-3 gap-2 py-3 border-t border-slate-200 dark:border-slate-700">
              <div class="flex flex-col items-center gap-1">
                <span class="material-symbols-outlined text-slate-400 text-lg">calendar_today</span>
                <span class="text-[11px] font-medium">${car.year}</span>
              </div>
              <div class="flex flex-col items-center gap-1">
                <span class="material-symbols-outlined text-slate-400 text-lg">speed</span>
                <span class="text-[11px] font-medium">${formatMileage(car.mileage)}</span>
              </div>
              <div class="flex flex-col items-center gap-1">
                <button onclick="event.preventDefault(); handleDelete(${car.id})" class="text-slate-400 hover:text-red-500 transition-colors" title="Eliminar">
                  <span class="material-symbols-outlined text-lg">delete</span>
                </button>
                <span class="text-[11px] font-medium text-slate-400">Eliminar</span>
              </div>
            </div>
          </div>
        </div>
      `}).join("");
      } catch (e) {
        loading.classList.add("hidden");
        empty.classList.remove("hidden");
        console.error("Error al cargar autos:", e);
      }
    }

    function filterByBrand(brandId, brandName) {
      activeBrandId = brandId;
      document.getElementById("sectionTitle").textContent = `Autos ${brandName}`;
      document.getElementById("clearFilter").classList.remove("hidden");
      document.querySelectorAll(".brand-card").forEach(el => {
        el.classList.toggle("border-primary", parseInt(el.dataset.brandId) === brandId);
        el.classList.toggle("ring-2", parseInt(el.dataset.brandId) === brandId);
        el.classList.toggle("ring-primary", parseInt(el.dataset.brandId) === brandId);
      });
      loadCars(brandId);
    }

    document.getElementById("clearFilter").addEventListener("click", () => {
      activeBrandId = null;
      document.getElementById("sectionTitle").textContent = "Todos los Autos";
      document.getElementById("clearFilter").classList.add("hidden");
      document.querySelectorAll(".brand-card").forEach(el => {
        el.classList.remove("border-primary", "ring-2", "ring-primary");
      });
      loadCars();
    });

    async function handleDelete(carId) {
      if (!confirm("¿Estás seguro de que deseas eliminar este auto?")) return;
      try {
        await deleteCar(carId);
        showToast("Auto eliminado exitosamente");
        loadCars(activeBrandId);
      } catch (e) {
        showToast(e.message, "error");
      }
    }

    // --- Banner Carrusel ---
    const bannerImages = [
      "/static/images/banner1.jpg",
      "/static/images/banner2.jpg",
    ];
    let currentBanner = 0;
    let bannerInterval;

    function initBanner() {
      const container = document.getElementById("heroBanner");
      const dotsContainer = document.getElementById("bannerDots");
      const validImages = bannerImages;

      if (validImages.length === 0) {
        container.parentElement.style.display = "none";
        return;
      }

      container.innerHTML = validImages.map((src, i) => `
      <img src="${src}" alt="Banner ${i + 1}" class="absolute inset-0 w-full h-full object-cover transition-opacity duration-500 ${i === 0 ? 'opacity-100' : 'opacity-0'}" data-banner="${i}" onerror="this.style.display='none'" />
    `).join("");

      dotsContainer.innerHTML = validImages.map((_, i) => `
      <button onclick="goToBanner(${i})" class="w-2.5 h-2.5 rounded-full transition-colors ${i === 0 ? 'bg-white' : 'bg-white/50'}" data-bdot="${i}"></button>
    `).join("");

      bannerInterval = setInterval(() => slideBanner(1), 5000);
    }

    function slideBanner(dir) {
      const slides = document.querySelectorAll("[data-banner]");
      if (slides.length === 0) return;
      currentBanner = (currentBanner + dir + slides.length) % slides.length;
      updateBanner();
    }

    function goToBanner(index) {
      currentBanner = index;
      updateBanner();
      clearInterval(bannerInterval);
      bannerInterval = setInterval(() => slideBanner(1), 5000);
    }

    function updateBanner() {
      document.querySelectorAll("[data-banner]").forEach((s, i) => {
        s.classList.toggle("opacity-100", i === currentBanner);
        s.classList.toggle("opacity-0", i !== currentBanner);
      });
      document.querySelectorAll("[data-bdot]").forEach((d, i) => {
        d.classList.toggle("bg-white", i === currentBanner);
        d.classList.toggle("bg-white/50", i !== currentBanner);
      });
    }

    initBanner();
    loadBrands();
    loadCars();
  </script>
</body>

</html>
